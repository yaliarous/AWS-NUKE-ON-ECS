name: Renovate

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    env:
      RENOVATE_REPOSITORIES: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: renovatebot/github-action@v46.1.14
        with:
          renovate-version: full
          token: ${{ secrets.RENOVATE_TOKEN }}